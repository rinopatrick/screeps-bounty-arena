name: Low-trust triage

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created, edited]
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage untrusted submissions
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- low-trust-triage-v2 -->';

            const urlPattern = /https?:\/\/[^\s)>'"]+/gi;
            const repoUrlPattern = /^https:\/\/github\.com\/waxeye7\/screeps-bounty-arena(?:\/|$)/i;
            const githubAttachmentPattern = /^https:\/\/(?:user-images\.githubusercontent\.com|github\.com\/user-attachments\/assets)\//i;
            const archivePattern = /\.(?:zip|tar|tgz|tar\.gz|7z|rar|exe|dmg|pkg|appimage|bin)(?:[?#].*)?$/i;
            const blockedHostPattern = /\b(?:gofile\.io|mega\.nz|mediafire\.com|anonfiles\.com|pixeldrain\.com|dropbox\.com|drive\.google\.com|wetransfer\.com|pastebin\.com|gist\.github\.com|file\.io)\b/i;
            const videoHostPattern = /\b(?:youtube\.com|youtu\.be|vimeo\.com|streamable\.com)\b/i;
            const secretPathPattern = /(^|\/)(?:\.env(?:\..*)?|\.screepsrc|\.screeps\.json|secrets?\.(?:json|ya?ml|toml|ini)|credentials?\.(?:json|ya?ml|toml|ini)|memory.*\.json)$/i;
            const binaryPathPattern = /\.(?:zip|tar|tgz|gz|7z|rar|exe|dll|dmg|pkg|appimage|png|jpe?g|gif|mp4|mov|webm|pdf)$/i;
            const workflowPathPattern = /^\.github\/workflows\//;

            async function addLabels(issue_number, labels) {
              const unique = [...new Set(labels)].filter(Boolean);
              if (!unique.length) return;
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: unique });
            }

            async function commentOnce(issue_number, body) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number, per_page: 100,
              });
              if (comments.some((comment) => comment.body && comment.body.includes(marker))) return;
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

            async function closeIssue(issue_number, reasonComment) {
              await commentOnce(issue_number, `${marker}\n${reasonComment}`);
              await github.rest.issues.update({ owner, repo, issue_number, state: 'closed' });
            }

            function classifyText(text) {
              const value = text || '';
              const urls = value.match(urlPattern) || [];
              const flags = [];
              for (const rawUrl of urls) {
                const url = rawUrl.replace(/[.,;:]+$/, '');
                if (repoUrlPattern.test(url) || githubAttachmentPattern.test(url)) continue;
                if (archivePattern.test(url) || blockedHostPattern.test(url)) flags.push('blocked-external-download');
                else if (videoHostPattern.test(url)) flags.push('external-video-link');
                else flags.push('external-link');
              }
              return [...new Set(flags)];
            }

            function externalLinkComment(flags) {
              if (flags.includes('blocked-external-download')) {
                return `${marker}\nClosed because this submission relies on external download/archive/file-host links. Code must be submitted as a normal GitHub PR diff, and proof must be pasted or attached in GitHub. External archives/downloads are not accepted.`;
              }
              return `${marker}\nThis submission includes external links, so it has been labeled \`low-trust\`. External links are not accepted as primary proof. Please paste logs/commands directly in the PR or use GitHub attachments as supporting evidence.`;
            }

            if (context.eventName === 'pull_request_target') {
              const pr = context.payload.pull_request;
              const issue_number = pr.number;
              const textFlags = classifyText(`${pr.title}\n${pr.body || ''}`);
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner, repo, pull_number: issue_number, per_page: 100,
              });
              const changedPaths = files.map((file) => file.filename);
              const secretFiles = changedPaths.filter((path) => secretPathPattern.test(path));
              const binaryFiles = changedPaths.filter((path) => binaryPathPattern.test(path));
              const workflowFiles = changedPaths.filter((path) => workflowPathPattern.test(path));

              const labels = [];
              if (textFlags.length) labels.push('low-trust', 'external-link');
              if (secretFiles.length) labels.push('blocked:secrets');
              if (binaryFiles.length) labels.push('blocked:binary-artifact');
              if (workflowFiles.length) labels.push('needs-maintainer-review');
              if ((pr.body || '').toLowerCase().includes('rcl') && !(pr.body || '').toLowerCase().includes('seed')) labels.push('needs-proof');
              await addLabels(issue_number, labels);

              if (secretFiles.length) {
                await closeIssue(issue_number, `Closed automatically because this PR changes files that look like secrets or local Screeps credentials:\n\n${secretFiles.map((p) => `- \`${p}\``).join('\n')}\n\nUse example config files only. Never commit real tokens or private config.`);
                return;
              }

              if (binaryFiles.length) {
                await closeIssue(issue_number, `Closed automatically because this PR commits binary/archive/media artifacts into the repo:\n\n${binaryFiles.map((p) => `- \`${p}\``).join('\n')}\n\nKeep repository changes as reviewable text/code. Proof should be pasted or attached in GitHub, not committed as binary files.`);
                return;
              }

              if (textFlags.includes('blocked-external-download')) {
                await closeIssue(issue_number, externalLinkComment(textFlags));
                return;
              }

              if (textFlags.length) {
                await commentOnce(issue_number, externalLinkComment(textFlags));
              }

              if (workflowFiles.length) {
                await commentOnce(issue_number, `${marker}\nThis PR changes GitHub Actions workflow files, so it needs explicit maintainer review before merge. Workflow changes from untrusted submissions are never auto-approved.`);
              }
              return;
            }

            if (context.eventName === 'issues') {
              const issue = context.payload.issue;
              if (issue.pull_request) return;
              const issue_number = issue.number;
              const flags = classifyText(`${issue.title}\n${issue.body || ''}`);
              if (flags.includes('blocked-external-download')) {
                await addLabels(issue_number, ['low-trust', 'external-link']);
                await closeIssue(issue_number, externalLinkComment(flags));
              } else if (flags.length) {
                await addLabels(issue_number, ['low-trust', 'external-link']);
                await commentOnce(issue_number, externalLinkComment(flags));
              }
              return;
            }

            if (context.eventName === 'issue_comment') {
              const comment = context.payload.comment;
              const issue = context.payload.issue;
              const issue_number = issue.number;
              const flags = classifyText(comment.body || '');
              if (flags.includes('blocked-external-download')) {
                await addLabels(issue_number, ['low-trust', 'external-link']);
                await closeIssue(issue_number, externalLinkComment(flags));
              } else if (flags.length) {
                await addLabels(issue_number, ['low-trust', 'external-link']);
                await commentOnce(issue_number, externalLinkComment(flags));
              }
            }
