name: Low-trust triage

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created, edited]
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage untrusted submissions
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- low-trust-triage-v1 -->';

            const externalHostPattern = /\b(?:gofile\.io|mega\.nz|mediafire\.com|anonfiles\.com|pixeldrain\.com|dropbox\.com|drive\.google\.com|weTransfer\.com|wetransfer\.com|pastebin\.com|gist\.github\.com|file\.io)\b/i;
            const archivePattern = /\bhttps?:\/\/\S+\.(?:zip|tar|tgz|tar\.gz|7z|rar|exe|dmg|pkg|appimage|bin)(?:\?\S*)?/i;
            const proofVideoPattern = /\b(?:youtube\.com|youtu\.be|github\.com\/.*\/assets|user-images\.githubusercontent\.com)\b/i;
            const secretPathPattern = /(^|\/)(?:\.env(?:\..*)?|\.screepsrc|\.screeps\.json|secrets?\.(?:json|ya?ml|toml|ini)|credentials?\.(?:json|ya?ml|toml|ini)|memory.*\.json)$/i;
            const binaryPathPattern = /\.(?:zip|tar|tgz|gz|7z|rar|exe|dll|dmg|pkg|appimage|png|jpe?g|gif|mp4|mov|webm|pdf)$/i;
            const workflowPathPattern = /^\.github\/workflows\//;

            async function addLabels(issue_number, labels) {
              if (!labels.length) return;
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels });
            }

            async function commentOnce(issue_number, body) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number, per_page: 100,
              });
              if (comments.some((comment) => comment.body && comment.body.includes(marker))) return;
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

            async function closeIssue(issue_number, reasonComment) {
              await commentOnce(issue_number, `${marker}\n${reasonComment}`);
              await github.rest.issues.update({ owner, repo, issue_number, state: 'closed' });
            }

            function classifyText(text) {
              const value = text || '';
              const flags = [];
              if (archivePattern.test(value)) flags.push('external-archive-link');
              if (externalHostPattern.test(value)) flags.push('external-download-host');
              return flags;
            }

            if (context.eventName === 'pull_request_target') {
              const pr = context.payload.pull_request;
              const issue_number = pr.number;
              const textFlags = classifyText(`${pr.title}\n${pr.body || ''}`);
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner, repo, pull_number: issue_number, per_page: 100,
              });
              const changedPaths = files.map((file) => file.filename);
              const secretFiles = changedPaths.filter((path) => secretPathPattern.test(path));
              const binaryFiles = changedPaths.filter((path) => binaryPathPattern.test(path));
              const workflowFiles = changedPaths.filter((path) => workflowPathPattern.test(path));

              const labels = [];
              if (textFlags.length) labels.push('low-trust', 'external-link');
              if (secretFiles.length) labels.push('blocked:secrets');
              if (binaryFiles.length) labels.push('blocked:binary-artifact');
              if (workflowFiles.length) labels.push('needs-maintainer-review');
              if ((pr.body || '').toLowerCase().includes('rcl') && !proofVideoPattern.test(pr.body || '')) labels.push('needs-proof');
              await addLabels(issue_number, [...new Set(labels)]);

              if (secretFiles.length) {
                await closeIssue(issue_number, `Closed automatically because this PR changes files that look like secrets or local Screeps credentials:\n\n${secretFiles.map((p) => `- \`${p}\``).join('\n')}\n\nPlease reopen with a clean PR that uses example config files only, never real tokens or private config.`);
                return;
              }

              if (binaryFiles.length) {
                await closeIssue(issue_number, `Closed automatically because this PR commits binary/archive/media artifacts into the repo:\n\n${binaryFiles.map((p) => `- \`${p}\``).join('\n')}\n\nPlease keep proof videos as GitHub/YouTube links in the PR body and keep repository changes as reviewable text/code.`);
                return;
              }

              if (textFlags.length) {
                await commentOnce(issue_number, `${marker}\nThanks for the submission. This PR mentions external download/archive links, so it has been labeled \`low-trust\` for maintainer review.\n\nPlease make sure all code changes are visible directly in the GitHub PR diff. External links may be used only as supporting proof videos/logs, not as the source of code to review.`);
                return;
              }

              if (workflowFiles.length) {
                await commentOnce(issue_number, `${marker}\nThis PR changes GitHub Actions workflow files, so it needs explicit maintainer review before merge. I will not auto-approve workflow changes from untrusted submissions.`);
              }
              return;
            }

            if (context.eventName === 'issues') {
              const issue = context.payload.issue;
              if (issue.pull_request) return;
              const issue_number = issue.number;
              const flags = classifyText(`${issue.title}\n${issue.body || ''}`);
              if (flags.length) {
                await addLabels(issue_number, ['low-trust', 'external-link']);
                await commentOnce(issue_number, `${marker}\nThis issue includes external download/archive-style links and has been labeled for maintainer review. Please do not use external archives for code submission; open a normal GitHub PR instead.`);
              }
              return;
            }

            if (context.eventName === 'issue_comment') {
              const comment = context.payload.comment;
              const issue = context.payload.issue;
              const issue_number = issue.number;
              const flags = classifyText(comment.body || '');
              if (flags.length) {
                await addLabels(issue_number, ['low-trust', 'external-link']);
                await commentOnce(issue_number, `${marker}\nA comment on this thread includes external download/archive-style links, so this has been labeled for maintainer review. Please submit code through a normal GitHub PR diff. Supporting proof videos/logs are okay, but external code archives are not accepted.`);
              }
            }
