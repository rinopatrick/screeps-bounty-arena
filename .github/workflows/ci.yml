name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    name: Typecheck, tests, and simulation smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: 1k simulation smoke
        run: npm run simulate:1k

      - name: 10k simulation smoke
        run: npm run simulate:10k

      - name: Seeded simulation smoke
        env:
          CI_SEED_BASE: ${{ github.event.pull_request.head.sha || github.sha }}
        run: npm run simulate:seeded:markdown
